<!DOCTYPE html>
<!--
  Views/layouts/main.html
  Layout base reutilizável — inclua via SSI, template engine ou copie a estrutura
  para cada página. Marcado com comentários para fácil substituição.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title><!-- PAGE_TITLE --> Sala do Futuro — Sistema de Ponto</title>

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2300e5ff'/><text y='22' x='5' font-size='18'>🏫</text></svg>" />

  <!-- CSS principal -->
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<!-- ======================================================
     OVERLAY SIDEBAR (mobile)
     ====================================================== -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- ======================================================
     LAYOUT PRINCIPAL
     ====================================================== -->
<div class="app-layout">

  <!-- ====================================================
       SIDEBAR
       ==================================================== -->
  <aside class="sidebar" id="sidebar">

    <!-- Branding -->
    <div class="sidebar-brand">
      <div class="brand-icon">🏫</div>
      <div class="brand-text">
        <span class="brand-name">Sala do Futuro</span>
        <span class="brand-sub">Controle de Ponto</span>
      </div>
    </div>

    <!-- Navegação -->
    <nav class="sidebar-nav" aria-label="Menu principal">

      <div class="nav-section-label">Principal</div>

      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">⊞</span>
        Dashboard
      </a>

      <div class="nav-section-label">Funcionários</div>

      <a href="funcionarios.html" class="nav-item">
        <span class="nav-icon">👥</span>
        Funcionários
      </a>

      <a href="registrar-funcionario.html" class="nav-item">
        <span class="nav-icon">＋</span>
        Registrar
      </a>

      <div class="nav-section-label">Ponto</div>

      <a href="pontos-do-dia.html" class="nav-item">
        <span class="nav-icon">🕐</span>
        Pontos do Dia
      </a>

      <a href="relatorios.html" class="nav-item">
        <span class="nav-icon">📊</span>
        Relatórios
      </a>

    </nav>

    <!-- Rodapé do sidebar -->
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="window.location.href='../index.html'">
        <span class="nav-icon">⎋</span>
        Sair do sistema
      </button>
    </div>

  </aside>

  <!-- ====================================================
       CONTEÚDO PRINCIPAL
       ==================================================== -->
  <div class="main-content">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <!-- Botão hamburger (mobile) -->
        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">☰</button>

        <!-- Breadcrumb -->
        <div class="page-breadcrumb">
          <span>Sala do Futuro</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current"><!-- BREADCRUMB_CURRENT --> Dashboard</span>
        </div>
      </div>

      <div class="topbar-right">
        <!-- Relógio -->
        <div class="topbar-datetime">
          <div class="topbar-time" id="topbar-time">--:--</div>
          <div class="topbar-date" id="topbar-date"></div>
        </div>

        <!-- Perfil do admin -->
        <div class="admin-profile" title="Perfil do administrador">
          <div class="admin-avatar" id="admin-avatar">CE</div>
          <div class="admin-info">
            <span class="admin-firstname" id="admin-firstname">Carlos</span>
            <span class="admin-role" id="admin-role">Administrador</span>
          </div>
        </div>
      </div>
    </header>

    <!-- ==========================================
         CONTEÚDO DA PÁGINA — substituir aqui
         ========================================== -->
    <main class="page-content">
      <!-- PAGE_CONTENT -->
    </main>

  </div><!-- /.main-content -->

</div><!-- /.app-layout -->

<!-- ======================================================
     TOAST CONTAINER (notificações)
     ====================================================== -->
<div class="toast-container" id="toast-container"></div>

<!-- JavaScript principal -->
<script src="../assets/js/main.js"></script>
</body>
</html>
