<!DOCTYPE html>
<!--
  Views/index.html
  Página de Login do Administrador
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sala do Futuro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2300e5ff'/><text y='22' x='5' font-size='18'>🏫</text></svg>" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<div class="login-page">
  <!-- Fundo decorativo -->
  <div class="login-bg"></div>

  <!-- Card de login -->
  <div class="login-card">

    <!-- Branding -->
    <div class="login-brand">
      <div class="login-brand-icon">🏫</div>
      <span class="login-brand-name">Sala do Futuro</span>
    </div>

    <h1 class="login-title">Bem-vindo de volta</h1>
    <p class="login-subtitle">Acesse o painel de controle de ponto</p>

    <!-- Formulário -->
    <form class="login-form" id="form-login" autocomplete="off">

      <div class="form-group">
        <label for="login-email">E-mail do administrador</label>
        <input
          type="email"
          id="login-email"
          class="form-input"
          placeholder="admin@escola.edu.br"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="login-senha">Senha</label>
        <input
          type="password"
          id="login-senha"
          class="form-input"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
        Entrar no sistema →
      </button>

    </form>

    <!-- Rodapé do card -->
    <p style="text-align:center; margin-top:24px; font-size:12px; color:var(--text-muted);">
      Sistema restrito para administradores autorizados.<br/>
      Sala do Futuro © 2025
    </p>

  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="assets/js/main.js"></script>
</body>
</html>
