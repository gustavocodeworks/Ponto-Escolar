<!DOCTYPE html>
<!--
  Views/index.html
  Pagina unica para login admin e batida publica
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sala do Futuro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2300e5ff'/><text y='22' x='5' font-size='18'>P</text></svg>" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-card" id="auth-card">
    <div class="login-brand">
      <div class="login-brand-icon" id="login-brand-icon">P</div>
      <span class="login-brand-name" id="login-brand-name">Sala do Futuro</span>
    </div>

    <h1 class="login-title" id="login-title">Bem-vindo de volta</h1>
    <p class="login-subtitle" id="login-subtitle">Acesse o painel de controle de ponto</p>

    <form class="login-form" id="form-login" autocomplete="off">
      <div class="form-group">
        <label for="login-email">E-mail do administrador</label>
        <input
          type="email"
          id="login-email"
          class="form-input"
          placeholder="admin@escola.edu.br"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="login-senha">Senha</label>
        <input
          type="password"
          id="login-senha"
          class="form-input"
          placeholder="********"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
        Entrar no sistema ->
      </button>
    </form>

    <form class="login-form hidden" id="form-bater-ponto" autocomplete="off">
      <div class="form-group">
        <label for="ponto-cpf">CPF</label>
        <input
          type="text"
          id="ponto-cpf"
          class="form-input"
          placeholder="000.000.000-00"
          maxlength="14"
          inputmode="numeric"
          required
        />
      </div>

      <div class="form-group">
        <label for="ponto-token">Token do dia</label>
        <input
          type="text"
          id="ponto-token"
          class="form-input"
          placeholder="64 caracteres hexadecimais"
          minlength="64"
          maxlength="64"
          autocomplete="off"
          required
        />
      </div>

      <p class="punch-short-link" style="margin-top:0;">
        A localizacao sera validada automaticamente ao clicar em registrar.
      </p>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-enviar-ponto">
        Registrar ponto
      </button>
    </form>

    <p id="login-footer-admin" style="text-align:center; margin-top:24px; font-size:12px; color:var(--text-muted);">
      Sistema restrito para administradores autorizados.<br/>
      Sala do Futuro 2025
    </p>
    <p id="login-footer-public-link" style="text-align:center; margin-top:12px; font-size:12px; color:var(--text-muted);">
      Funcionario sem celular? Use <a href="/ponto" style="color:var(--accent-cyan); font-weight:700; text-decoration:none;">/ponto</a>
    </p>
    <p id="ponto-footer-hint" class="punch-short-link hidden">
      Este e o mesmo link usado no QR Code: <a href="/ponto">/ponto</a>
    </p>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="assets/js/main.js"></script>
</body>
</html>
